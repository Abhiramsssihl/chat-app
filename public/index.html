<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#111b21;color:#e9edef;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ── Auth Screen ── */
#auth-screen{position:fixed;inset:0;background:#111b21;display:flex;align-items:center;justify-content:center;z-index:200}
.auth-box{background:#202c33;border-radius:16px;padding:40px 36px;width:380px;max-width:95vw;text-align:center}
.auth-box .logo{font-size:48px;margin-bottom:12px}
.auth-box h1{font-size:22px;font-weight:600;color:#e9edef;margin-bottom:6px}
.auth-box p{font-size:14px;color:#8696a0;margin-bottom:28px}
.auth-input{width:100%;background:#2a3942;border:1px solid #374045;border-radius:8px;padding:11px 14px;color:#e9edef;font-size:14px;outline:none;margin-bottom:12px;transition:border .2s}
.auth-input:focus{border-color:#00a884}
.auth-btn{width:100%;background:#00a884;color:#111b21;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.auth-btn:hover{background:#02b093}
.auth-divider{color:#8696a0;font-size:13px;margin:12px 0}
.auth-secondary{background:transparent;border:1px solid #374045;color:#e9edef}
.auth-secondary:hover{background:#374045}
.avatar-picker{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.avatar-opt{width:52px;height:52px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .2s;object-fit:cover}
.avatar-opt.selected{border-color:#00a884}

/* ── App Layout ── */
#app{display:flex;height:100vh;width:100%}
.sidebar{width:360px;min-width:360px;background:#111b21;border-right:1px solid #222d34;display:flex;flex-direction:column;height:100vh}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#202c33}
.user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid #00a884;flex-shrink:0}
.header-actions{display:flex;gap:4px;margin-left:auto}
.icon-btn{background:none;border:none;color:#aebac1;cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;font-size:18px}
.icon-btn:hover{background:#374045}
.search-bar{padding:8px 12px;background:#111b21}
.search-wrap{position:relative}
.search-input{width:100%;background:#202c33;border:none;border-radius:8px;padding:9px 12px 9px 36px;color:#e9edef;font-size:14px;outline:none}
.search-input::placeholder{color:#8696a0}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8696a0;font-size:14px;pointer-events:none}
.tabs{display:flex;border-bottom:1px solid #222d34}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;color:#8696a0;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#00a884;border-bottom-color:#00a884}
.chat-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #1f2c33}
.chat-item:hover,.chat-item.active{background:#202c33}
.av-wrap{position:relative;flex-shrink:0}
.av-wrap img{width:46px;height:46px;border-radius:50%;object-fit:cover}
.online-dot{width:12px;height:12px;border-radius:50%;background:#00a884;border:2px solid #111b21;position:absolute;bottom:0;right:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:12px;color:#8696a0}
.badge{background:#00a884;color:#111b21;font-size:11px;font-weight:700;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}

/* ── Main Panel ── */
.main{flex:1;display:flex;flex-direction:column;background:#0b141a;min-width:0}
.chat-header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#202c33}
.chat-header-info{flex:1;cursor:pointer;min-width:0}
.chat-header-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header-sub{font-size:12px;color:#8696a0;margin-top:1px}
.messages{flex:1;overflow-y:auto;padding:16px 8%;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex}
.msg-row.sent{justify-content:flex-end}
.msg-row.recv{justify-content:flex-start}
.msg-bubble{max-width:65%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-bubble.sent{background:#005c4b;border-top-right-radius:2px}
.msg-bubble.recv{background:#202c33;border-top-left-radius:2px}
.msg-time{font-size:11px;text-align:right;margin-top:4px;color:#8696a0}
.msg-time.sent-t{color:#8aad9f}
.tick{font-size:12px}
.tick.read{color:#53bdeb}
.date-div{text-align:center;margin:10px 0;font-size:12px;color:#8696a0}
.date-div span{background:#182229;padding:4px 12px;border-radius:8px}
.input-area{display:flex;align-items:flex-end;gap:8px;padding:10px 16px;background:#202c33}
.msg-input{flex:1;background:#2a3942;border:none;border-radius:8px;padding:10px 14px;color:#e9edef;font-size:15px;outline:none;resize:none;max-height:120px;min-height:42px;font-family:inherit}
.msg-input::placeholder{color:#8696a0}
.send-btn{background:#00a884;border:none;color:#111b21;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;transition:background .2s}
.send-btn:hover{background:#02b093}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.empty-state h2{font-size:20px;font-weight:300}
.empty-state p{color:#8696a0;font-size:14px;text-align:center;max-width:300px}

/* ── Typing indicator ── */
.typing-wrap{display:flex;padding:4px 0}
.typing-bubble{background:#202c33;border-radius:8px;border-top-left-radius:2px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.tdot{width:6px;height:6px;border-radius:50%;background:#8696a0;animation:bounce 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#222e35;border-radius:12px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;font-weight:500;margin-bottom:20px}
.modal-close{float:right;background:none;border:none;color:#8696a0;font-size:20px;cursor:pointer;line-height:1;padding:0}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#8696a0;margin-bottom:5px}
.form-group input{width:100%;background:#2a3942;border:1px solid #374045;border-radius:8px;padding:10px 12px;color:#e9edef;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#00a884}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:500;transition:.2s}
.btn-primary{background:#00a884;color:#111b21}
.btn-primary:hover{background:#02b093}
.btn-ghost{background:transparent;color:#8696a0;border:1px solid #374045}
.btn-ghost:hover{background:#374045;color:#e9edef}
.user-result{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;cursor:pointer;transition:background .15s}
.user-result:hover{background:#2a3942}
.profile-pic-wrap{position:relative;cursor:pointer;width:80px;height:80px;margin:0 auto 16px}
.profile-pic-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #00a884}
.profile-pic-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;font-size:11px;color:#fff;text-align:center;pointer-events:none}
.profile-pic-wrap:hover .profile-pic-overlay{opacity:1}
.req-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #1f2c33}
.req-btn{padding:6px 12px;border-radius:6px;border:none;font-size:12px;cursor:pointer;font-weight:500}
.req-btn.accept{background:#00a884;color:#111b21}
.req-btn.decline{background:#374045;color:#e9edef}
.req-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;background:#3d2e1e;color:#e09132}
.section-label{padding:8px 16px;font-size:12px;color:#8696a0;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a3942;color:#e9edef;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;animation:fadeup .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="logo">💬</div>
    <h1>ChatApp</h1>
    <p>Real-time messaging with Socket.io</p>
    <div id="auth-register">
      <p style="font-size:13px;color:#8696a0;margin-bottom:14px">Choose an avatar:</p>
      <div class="avatar-picker" id="avatar-picker"></div>
      <input class="auth-input" id="reg-name" placeholder="Your display name" maxlength="40">
      <input class="auth-input" id="reg-status" placeholder="Status (e.g. Available 🌿)" maxlength="60">
      <button class="auth-btn" onclick="register()">Start Chatting</button>
      <div class="auth-divider">— or —</div>
      <div style="display:flex;gap:8px">
        <input class="auth-input" id="login-id" placeholder="Paste your User ID" style="margin:0">
        <button class="auth-btn auth-secondary btn" onclick="login()" style="width:auto;padding:11px 16px;white-space:nowrap">Login</button>
      </div>
    </div>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────── -->
<div id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="av-wrap" style="cursor:pointer" onclick="openProfile()">
        <img class="user-avatar" id="my-avatar" src="" alt="Me">
        <span class="online-dot"></span>
      </div>
      <span style="font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="my-name">Me</span>
      <div class="header-actions">
        <button class="icon-btn" onclick="openSearch()" title="Find people">🔍</button>
        <button class="icon-btn" onclick="copyMyId()" title="Copy my ID">🪪</button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="chat-filter" placeholder="Search chats" oninput="filterChats(this.value)">
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-chats" onclick="switchTab('chats')">Chats</div>
      <div class="tab" id="tab-requests" onclick="switchTab('requests')">Requests <span id="req-count" style="display:none;color:#00a884"></span></div>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="chat-list" id="requests-list" style="display:none"></div>
  </div>

  <div class="main">
    <div class="empty-state" id="empty-state">
      <div style="font-size:48px">💬</div>
      <h2>Welcome to ChatApp</h2>
      <p>Search for users or share your ID to start chatting in real time.</p>
      <button class="btn btn-primary" onclick="copyMyId()">Copy My ID</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="openSearch()">Find People 🔍</button>
    </div>
    <div id="chat-panel" style="display:none;flex-direction:column;flex:1">
      <div class="chat-header">
        <div class="av-wrap" style="flex-shrink:0">
          <img id="active-avatar" src="" alt="" style="width:42px;height:42px;border-radius:50%;object-fit:cover">
          <span class="online-dot" id="active-online" style="display:none"></span>
        </div>
        <div class="chat-header-info" onclick="viewContact()">
          <div class="chat-header-name" id="active-name"></div>
          <div class="chat-header-sub" id="active-sub">online</div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="Call">📞</button>
          <button class="icon-btn" title="Video">📹</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button class="icon-btn">😊</button>
        <textarea class="msg-input" id="msg-input" placeholder="Type a message" rows="1"
          oninput="autoResize(this);onTyping()"
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Modals ──────────────────────────────────────── -->
<div class="overlay" id="search-modal" style="display:none" onclick="if(event.target===this)closeModal('search-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('search-modal')">✕</button>
    <h2>Find People</h2>
    <div class="form-group">
      <label>Search by name or @id</label>
      <input id="user-search-input" placeholder="e.g. alice" oninput="searchUsers(this.value)" autofocus>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<div class="overlay" id="profile-modal" style="display:none" onclick="if(event.target===this)closeModal('profile-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('profile-modal')">✕</button>
    <h2>Edit Profile</h2>
    <div class="profile-pic-wrap" onclick="document.getElementById('avatar-upload').click()">
      <img id="profile-edit-img" src="" alt="">
      <div class="profile-pic-overlay">📷<br>Change</div>
    </div>
    <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="handleAvatarFile(event)">
    <div class="form-group">
      <label>Display Name</label>
      <input id="edit-name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>User ID (share this to get messages)</label>
      <input id="edit-id" readonly style="opacity:.6;cursor:not-allowed;font-size:13px">
    </div>
    <div class="form-group">
      <label>Status</label>
      <input id="edit-status" placeholder="e.g. Available 🌿">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('profile-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="overlay" id="contact-modal" style="display:none" onclick="if(event.target===this)closeModal('contact-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('contact-modal')">✕</button>
    <h2>Contact Info</h2>
    <div style="text-align:center;margin-bottom:20px">
      <div class="profile-pic-wrap" style="cursor:default"><img id="cm-avatar" src="" alt="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #00a884"></div>
      <div style="font-size:18px;font-weight:600;margin-bottom:4px" id="cm-name"></div>
      <div style="font-size:13px;color:#00a884" id="cm-id"></div>
    </div>
    <div style="background:#2a3942;border-radius:8px;padding:12px 16px;margin-bottom:16px">
      <div style="font-size:12px;color:#8696a0;margin-bottom:4px">Status</div>
      <div style="font-size:14px" id="cm-status"></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="closeModal('contact-modal')">Close</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const socket = io();
let me = null;
let friendsList = [];      // [{id,name,avatar,status,online}]
let activeChat = null;     // userId string
let chatMessages = {};     // {userId: [msg]}
let unreadCounts = {};     // {userId: n}
let typingUsers = {};      // {userId: bool}
let typingTimer = null;
let isTypingSent = false;
const AVATARS = Array.from({length:10},(_,i)=>`https://api.dicebear.com/9.x/avataaars/svg?seed=user${i}&backgroundColor=b6e3f4,c0aede,d1d4f9`);
let selectedAvatar = AVATARS[0];

// ── Auth ───────────────────────────────────────────────────────────────────
function buildAvatarPicker() {
  const el = document.getElementById('avatar-picker');
  AVATARS.forEach((src,i) => {
    const img = document.createElement('img');
    img.src = src; img.className = 'avatar-opt' + (i===0?' selected':'');
    img.onclick = () => { document.querySelectorAll('.avatar-opt').forEach(x=>x.classList.remove('selected')); img.classList.add('selected'); selectedAvatar = src; };
    el.appendChild(img);
  });
}
buildAvatarPicker();

function register() {
  const name = document.getElementById('reg-name').value.trim() || 'User';
  const status = document.getElementById('reg-status').value.trim() || 'Hey there!';
  socket.emit('register', { name, avatar: selectedAvatar, status }, res => {
    if (res.success) { me = res.user; startApp(); }
    else toast('Registration failed');
  });
}

function login() {
  const userId = document.getElementById('login-id').value.trim();
  if (!userId) return toast('Enter your User ID');
  socket.emit('login', { userId }, res => {
    if (res.success) { me = res.user; startApp(); }
    else toast('User ID not found on this server session');
  });
}

function startApp() {
  localStorage.setItem('chatapp_userid', me.id);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-avatar').src = me.avatar;
  document.getElementById('my-name').textContent = me.name;
  loadFriends();
}

// Auto-login if session exists
window.addEventListener('load', () => {
  const saved = localStorage.getItem('chatapp_userid');
  if (saved) { document.getElementById('login-id').value = saved; }
});

// ── Friends ────────────────────────────────────────────────────────────────
function loadFriends() {
  socket.emit('get_friends', {}, list => {
    friendsList = list;
    renderChatList();
  });
}

function renderChatList(filter='') {
  const el = document.getElementById('chat-list');
  const filtered = friendsList.filter(u => filter==='' || u.name.toLowerCase().includes(filter.toLowerCase()) || u.id.toLowerCase().includes(filter.toLowerCase()));
  if (!filtered.length) {
    el.innerHTML = `<div style="padding:32px;text-align:center;color:#8696a0;font-size:14px">${filter?'No results':'No chats yet.<br>Search and add friends!'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(u => {
    const msgs = chatMessages[u.id] || [];
    const last = msgs[msgs.length-1];
    const preview = last ? (last.from===me.id?'You: ':'')+last.text : '';
    const time = last ? fmtTime(last.time) : '';
    const unread = unreadCounts[u.id] || 0;
    const typing = typingUsers[u.id];
    return `<div class="chat-item${activeChat===u.id?' active':''}" onclick="openChat('${u.id}')">
      <div class="av-wrap">
        <img src="${u.avatar}" alt="${u.name}" style="width:46px;height:46px;border-radius:50%;object-fit:cover">
        ${u.online?'<span class="online-dot"></span>':''}
      </div>
      <div class="chat-info">
        <div class="chat-name">${esc(u.name)}</div>
        <div class="chat-preview">${typing?'<span style="color:#00a884">typing…</span>':esc(preview)}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${time}</div>
        ${unread>0?`<div class="badge">${unread}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── Open Chat ──────────────────────────────────────────────────────────────
function openChat(userId) {
  activeChat = userId;
  unreadCounts[userId] = 0;
  document.getElementById('empty-state').style.display = 'none';
  const panel = document.getElementById('chat-panel');
  panel.style.display = 'flex';
  const u = friendsList.find(f=>f.id===userId);
  if (!u) return;
  document.getElementById('active-avatar').src = u.avatar;
  document.getElementById('active-name').textContent = u.name;
  document.getElementById('active-sub').textContent = u.online ? '🟢 online' : 'offline';
  document.getElementById('active-online').style.display = u.online ? 'block' : 'none';
  // Load messages
  if (!chatMessages[userId]) {
    socket.emit('get_messages', { withUserId: userId }, msgs => {
      chatMessages[userId] = msgs;
      renderMessages();
    });
  } else {
    renderMessages();
  }
  socket.emit('mark_read', { fromUserId: userId });
  renderChatList(document.getElementById('chat-filter').value);
  document.getElementById('msg-input').focus();
}

// ── Render Messages ────────────────────────────────────────────────────────
function renderMessages() {
  const box = document.getElementById('messages');
  const msgs = chatMessages[activeChat] || [];
  if (!msgs.length) { box.innerHTML = '<div style="text-align:center;color:#8696a0;font-size:13px;padding:32px">Say hello! 👋</div>'; return; }
  let html = '', lastDate = null;
  msgs.forEach(m => {
    const d = new Date(m.time).toDateString();
    if (d !== lastDate) {
      lastDate = d;
      const label = d===new Date().toDateString()?'Today':new Date(m.time).toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'});
      html += `<div class="date-div"><span>${label}</span></div>`;
    }
    const mine = m.from === me.id;
    const t = new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const tick = mine ? `<span class="tick${m.read?' read':''}"> ${m.read?'✓✓':'✓'}</span>` : '';
    html += `<div class="msg-row ${mine?'sent':'recv'}">
      <div class="msg-bubble ${mine?'sent':'recv'}">${esc(m.text)}<div class="msg-time ${mine?'sent-t':''}">${t}${tick}</div></div>
    </div>`;
  });
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

// ── Send Message ───────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChat) return;
  socket.emit('send_message', { toUserId: activeChat, text }, res => {
    if (res.success) {
      if (!chatMessages[activeChat]) chatMessages[activeChat] = [];
      chatMessages[activeChat].push(res.message);
      input.value = ''; input.style.height = '';
      renderMessages();
      renderChatList(document.getElementById('chat-filter').value);
      stopTyping();
    }
  });
}

// ── Typing ─────────────────────────────────────────────────────────────────
function onTyping() {
  if (!activeChat) return;
  if (!isTypingSent) { isTypingSent = true; socket.emit('typing', { toUserId: activeChat, isTyping: true }); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}
function stopTyping() {
  if (!activeChat) return;
  isTypingSent = false;
  socket.emit('typing', { toUserId: activeChat, isTyping: false });
}

// ── Incoming events ────────────────────────────────────────────────────────
socket.on('new_message', msg => {
  if (!chatMessages[msg.from]) chatMessages[msg.from] = [];
  chatMessages[msg.from].push(msg);
  if (activeChat === msg.from) {
    renderMessages();
    socket.emit('mark_read', { fromUserId: msg.from });
  } else {
    unreadCounts[msg.from] = (unreadCounts[msg.from]||0) + 1;
  }
  renderChatList(document.getElementById('chat-filter').value);
});

socket.on('typing', ({ fromUserId, isTyping }) => {
  typingUsers[fromUserId] = isTyping;
  if (activeChat === fromUserId) {
    const box = document.getElementById('messages');
    const old = document.getElementById('typing-indicator');
    if (old) old.remove();
    if (isTyping) {
      const d = document.createElement('div');
      d.id = 'typing-indicator'; d.className = 'typing-wrap';
      d.innerHTML = '<div class="typing-bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
      box.appendChild(d); box.scrollTop = box.scrollHeight;
    }
  }
  renderChatList(document.getElementById('chat-filter').value);
});

socket.on('messages_read', ({ byUserId }) => {
  if (chatMessages[byUserId]) {
    chatMessages[byUserId].forEach(m => { if (m.from === me.id) m.read = true; });
  }
  if (activeChat === byUserId) renderMessages();
});

socket.on('user_online', ({ userId, online }) => {
  const u = friendsList.find(f=>f.id===userId);
  if (u) {
    u.online = online;
    if (activeChat === userId) {
      document.getElementById('active-sub').textContent = online ? '🟢 online' : 'offline';
      document.getElementById('active-online').style.display = online ? 'block' : 'none';
    }
    renderChatList(document.getElementById('chat-filter').value);
  }
});

socket.on('contact_updated', u => {
  const idx = friendsList.findIndex(f=>f.id===u.id);
  if (idx>=0) { friendsList[idx] = {...friendsList[idx], ...u}; renderChatList(); }
});

socket.on('friend_request', ({ fromUser, time }) => {
  toast(`📩 Friend request from ${fromUser.name}`);
  pendingRequests.push({ from: fromUser.id, fromUser, time });
  updateReqBadge();
  renderRequestsList();
});

socket.on('request_accepted', ({ byUser }) => {
  toast(`✅ ${byUser.name} accepted your request!`);
  if (!friendsList.find(f=>f.id===byUser.id)) friendsList.push(byUser);
  renderChatList();
});

socket.on('pending_requests', reqs => {
  reqs.forEach(r => { if (!pendingRequests.find(p=>p.from===r.from)) pendingRequests.push(r); });
  updateReqBadge();
  renderRequestsList();
});

// ── Requests ───────────────────────────────────────────────────────────────
let pendingRequests = [];

function updateReqBadge() {
  const n = pendingRequests.length;
  const el = document.getElementById('req-count');
  el.style.display = n ? 'inline' : 'none';
  el.textContent = `(${n})`;
}

function renderRequestsList() {
  const el = document.getElementById('requests-list');
  if (!pendingRequests.length) { el.innerHTML = '<div style="padding:32px;text-align:center;color:#8696a0;font-size:14px">No pending requests</div>'; return; }
  el.innerHTML = pendingRequests.map(r => {
    const u = r.fromUser;
    return `<div class="req-item">
      <div class="av-wrap"><img src="${u.avatar}" alt="" style="width:42px;height:42px;border-radius:50%;object-fit:cover"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${esc(u.name)}</div>
        <div style="font-size:12px;color:#8696a0">@${u.id}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="req-btn accept" onclick="acceptReq('${u.id}')">Accept</button>
        <button class="req-btn decline" onclick="declineReq('${u.id}')">Decline</button>
      </div>
    </div>`;
  }).join('');
}

function acceptReq(fromUserId) {
  socket.emit('accept_request', { fromUserId }, res => {
    if (res.success) {
      pendingRequests = pendingRequests.filter(r=>r.from!==fromUserId);
      updateReqBadge();
      if (res.user && !friendsList.find(f=>f.id===res.user.id)) friendsList.push(res.user);
      renderChatList();
      renderRequestsList();
      toast('✅ Friend added!');
    }
  });
}

function declineReq(fromUserId) {
  socket.emit('decline_request', { fromUserId }, () => {
    pendingRequests = pendingRequests.filter(r=>r.from!==fromUserId);
    updateReqBadge();
    renderRequestsList();
  });
}

// ── Search ─────────────────────────────────────────────────────────────────
function openSearch() {
  document.getElementById('search-modal').style.display = 'flex';
  document.getElementById('user-search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  setTimeout(()=>document.getElementById('user-search-input').focus(), 80);
}

async function searchUsers(q) {
  const el = document.getElementById('search-results');
  if (!q.trim()) { el.innerHTML = ''; return; }
  const res = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`);
  const users = await res.json();
  if (!users.length) { el.innerHTML = '<div style="color:#8696a0;font-size:14px;padding:12px;text-align:center">No users found</div>'; return; }
  el.innerHTML = users.map(u => {
    if (u.id === me.id) return '';
    const isFriend = friendsList.find(f=>f.id===u.id);
    const action = isFriend
      ? `<button class="btn btn-primary" onclick="openChatClose('${u.id}')">Message</button>`
      : `<button class="btn btn-primary" onclick="sendReq('${u.id}')">Add Friend</button>`;
    return `<div class="user-result">
      <div class="av-wrap" style="flex-shrink:0"><img src="${u.avatar}" alt="" style="width:46px;height:46px;border-radius:50%;object-fit:cover">${u.online?'<span class="online-dot"></span>':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${esc(u.name)}</div>
        <div style="font-size:12px;color:#8696a0">@${u.id} · ${esc(u.status||'')}</div>
      </div>
      ${action}
    </div>`;
  }).join('');
}

function sendReq(toUserId) {
  socket.emit('send_request', { toUserId }, res => {
    if (res.success) toast('Request sent! ✓');
    else toast(res.error || 'Could not send');
    searchUsers(document.getElementById('user-search-input').value);
  });
}

function openChatClose(id) {
  closeModal('search-modal');
  if (!friendsList.find(f=>f.id===id)) return;
  openChat(id);
}

// ── Profile ────────────────────────────────────────────────────────────────
function openProfile() {
  document.getElementById('profile-edit-img').src = me.avatar;
  document.getElementById('edit-name').value = me.name;
  document.getElementById('edit-id').value = me.id;
  document.getElementById('edit-status').value = me.status || '';
  document.getElementById('profile-modal').style.display = 'flex';
}

function handleAvatarFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    me.avatar = ev.target.result;
    document.getElementById('profile-edit-img').src = ev.target.result;
    document.getElementById('my-avatar').src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  const status = document.getElementById('edit-status').value.trim();
  socket.emit('update_profile', { name: name||me.name, avatar: me.avatar, status }, res => {
    if (res.success) {
      me = res.user;
      document.getElementById('my-name').textContent = me.name;
      document.getElementById('my-avatar').src = me.avatar;
      closeModal('profile-modal');
      toast('Profile updated ✓');
    }
  });
}

// ── Contact Info ───────────────────────────────────────────────────────────
function viewContact() {
  const u = friendsList.find(f=>f.id===activeChat); if (!u) return;
  document.getElementById('cm-avatar').src = u.avatar;
  document.getElementById('cm-name').textContent = u.name;
  document.getElementById('cm-id').textContent = '@' + u.id;
  document.getElementById('cm-status').textContent = u.status || '';
  document.getElementById('contact-modal').style.display = 'flex';
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-chats').classList.toggle('active', tab==='chats');
  document.getElementById('tab-requests').classList.toggle('active', tab==='requests');
  document.getElementById('chat-list').style.display = tab==='chats' ? 'block' : 'none';
  document.getElementById('requests-list').style.display = tab==='requests' ? 'block' : 'none';
  if (tab==='requests') renderRequestsList();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function filterChats(v) { renderChatList(v); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height=''; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function closeModal(id) { document.getElementById(id).style.display='none'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(d) {
  const t = new Date(d), now = new Date();
  if (t.toDateString()===now.toDateString()) return t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (now-t < 604800000) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][t.getDay()];
  return t.toLocaleDateString([],{day:'2-digit',month:'2-digit',year:'2-digit'});
}
function toast(msg) {
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(), 3000);
}
function copyMyId() {
  if (!me) return;
  navigator.clipboard.writeText(me.id).then(()=>toast('User ID copied! Share it with friends 🪪')).catch(()=>toast('ID: '+me.id));
}
</script>
</body>
